name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  # Optional share smoke. Gate before checkout/install so missing secrets are a
  # cheap no-op. E2E_BASE_URL is optional (package defaults to staging).
  # Prefers E2E_SHARE_TOKEN (no passkeys). See packages/e2e/README.md.
  e2e-share-smoke:
    name: E2E share smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Gate on credentials
        id: gate
        env:
          E2E_SHARE_TOKEN: ${{ secrets.E2E_SHARE_TOKEN }}
          E2E_OWNER_ACCESS_TOKEN: ${{ secrets.E2E_OWNER_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # Mirror packages/e2e trim: whitespace-only secrets are treated as unset.
          trim() {
            # shellcheck disable=SC2001
            printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }
          share="$(trim "${E2E_SHARE_TOKEN:-}")"
          owner="$(trim "${E2E_OWNER_ACCESS_TOKEN:-}")"
          if [ -z "$share" ] && [ -z "$owner" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Neither E2E_SHARE_TOKEN nor E2E_OWNER_ACCESS_TOKEN set (after trim) — skipping Playwright share smoke (no install)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Share smoke credentials present — proceeding."
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.run == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run share session smoke
        if: steps.gate.outputs.run == 'true'
        env:
          # Optional — package defaults to plan-staging.ericminassian.com
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_SHARE_TOKEN: ${{ secrets.E2E_SHARE_TOKEN }}
          E2E_SHARE_TRIP_TITLE: ${{ secrets.E2E_SHARE_TRIP_TITLE }}
          E2E_OWNER_ACCESS_TOKEN: ${{ secrets.E2E_OWNER_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          pnpm --filter @tripplan/e2e exec playwright install --with-deps chromium
          pnpm --filter @tripplan/e2e test:share
