openapi: 3.1.0
# Canonical OpenAPI for implemented routes — do not duplicate in openapi.json/TS.
info:
  title: TripPlan API
  version: 0.1.0
  description: |
    TripPlan HTTP API. Owner auth is external OIDC at
    auth.ericminassian.com via in-Lambda verification (no Cognito).
    Share access is capability-based: high-entropy token → HttpOnly cookie
    `tripplan_share` (first-party on the plan host). Raw tokens accepted only on
    POST /share/session; grants revalidated on every share request.
servers:
  - url: https://plan.ericminassian.com
    description: Production (CloudFront → API Gateway)
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Public
    description: No JWT required
  - name: Owner
    description: OIDC access token (Bearer / DPoP auto)
  - name: Share
    description: Share session cookie (tripplan_share); no owner JWT
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      tags: [Public]
      summary: Liveness check
      description: Public health endpoint; no authentication.
      security: []
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: ok
  /api/v1/me:
    get:
      operationId: getMe
      tags: [Owner]
      summary: Current owner profile
      description: |
        Requires a verified owner access token. Upserts the user profile from
        JWT claims (`userId` = `sub`, `displayName` from `nickname` when present,
        stores `iss`). Never requires email.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Profile (created or existing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Missing or invalid access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
          headers:
            WWW-Authenticate:
              schema:
                type: string
              description: RFC 6750 / RFC 9449 challenge when provided by the verifier
  /api/v1/trips:
    post:
      operationId: createTrip
      tags: [Owner]
      summary: Create trip
      description: |
        Create a trip owned by the authenticated subject (`sub`).
        Hard limit: 100 active trips per owner (ValidationError beyond).
      security:
        - ownerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrip"
      responses:
        "201":
          description: Trip created
          headers:
            ETag:
              schema:
                type: string
              description: Opaque version string (e.g. `"1"`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      operationId: listTrips
      tags: [Owner]
      summary: List owned active trips
      description: |
        Cursor-paginated list of the caller's active trips (deleted hidden).
        Default page size 50 (max 50).
      security:
        - ownerBearer: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor from a previous page's `nextCursor`
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 50
      responses:
        "200":
          description: Page of trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/trips/{tripId}:
    parameters:
      - $ref: "#/components/parameters/tripId"
    get:
      operationId: getTrip
      tags: [Owner]
      summary: Get trip meta + items
      description: |
        Returns trip metadata and items ordered by `sortKey` ascending.
        Soft-deleted trips return 404.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Trip detail
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchTrip
      tags: [Owner]
      summary: Update trip metadata
      description: |
        Requires `If-Match` with the current integer version (opaque quoted form).
        Body field `expectedVersion` is rejected with 400 ValidationError.
        Version mismatch → 409 Conflict with current `version` in details.
      security:
        - ownerBearer: []
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
          description: Opaque version, e.g. `"1"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrip"
      responses:
        "200":
          description: Updated trip
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteTrip
      tags: [Owner]
      summary: Soft-delete trip (interim)
      description: |
        Interim contract: sets `status=deleted` and `deletedAt` on trip meta only.
        Does not cascade children or enqueue SQS. List/GET hide deleted trips.
        Feature flag `TRIPS_DELETE_ENABLED` defaults on.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Soft-deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDeleteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Delete disabled by feature flag
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/export:
    parameters:
      - $ref: "#/components/parameters/tripId"
    get:
      operationId: exportTrip
      tags: [Owner]
      summary: Export trip JSON
      description: Portability payload — trip meta + items ordered by sortKey.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Export JSON
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/items:
    parameters:
      - $ref: "#/components/parameters/tripId"
    post:
      operationId: createItem
      tags: [Owner]
      summary: Create itinerary item
      description: |
        Create a discriminated itinerary item. Server assigns `itemId`, `sortKey`
        (append at end, gap 1000), `version: 1`, and timestamps.
        Hard limit: 100 items per trip (**best-effort** under concurrent creates;
        serial create beyond 100 is hard-rejected). Bumps trip version.
        Optional `Idempotency-Key` (max 128 chars, per-owner; cross-trip reuse → 409).
      security:
        - ownerBearer: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 128
          description: Optional create idempotency key (24h TTL)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItineraryItem"
            example:
              type: flight
              title: UA 100 SFO → JFK
              startAt: "2026-09-12T08:00:00-07:00"
              endAt: "2026-09-12T16:35:00-04:00"
              details:
                flightNumber: "100"
                airlineCode: UA
      responses:
        "201":
          description: Item created
          headers:
            ETag:
              schema:
                type: string
              description: Item version (e.g. `"1"`)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryItem"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/items/reorder:
    parameters:
      - $ref: "#/components/parameters/tripId"
    post:
      operationId: reorderItems
      tags: [Owner]
      summary: Reorder itinerary items
      description: |
        Full permutation reorder. Requires `If-Match` on **trip** version (trip-level lock).
        Assigns `sortKey = (index + 1) * 1000`, bumps trip version first, then updates
        items in chunks of ≤25. Body `expectedVersion` is rejected.
      security:
        - ownerBearer: []
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
          description: Current trip version, e.g. `"1"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderItems"
      responses:
        "200":
          description: Trip with reordered items
          headers:
            ETag:
              schema:
                type: string
              description: New trip version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/trips/{tripId}/items/{itemId}:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/itemId"
    patch:
      operationId: patchItem
      tags: [Owner]
      summary: Update itinerary item
      description: |
        Requires `If-Match` with the current **item** version. `type` is immutable
        (reject if present). Body `expectedVersion` is rejected. `details` is full replace
        when present. Version mismatch → 409.
      security:
        - ownerBearer: []
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
          description: Current item version, e.g. `"1"`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItineraryItem"
      responses:
        "200":
          description: Updated item
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryItem"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
    delete:
      operationId: deleteItem
      tags: [Owner]
      summary: Delete itinerary item
      description: |
        Deletes the item row and cascades its attachments (DDB ATT rows + S3 objects).
      security:
        - ownerBearer: []
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/items/{itemId}/attachments:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/itemId"
    get:
      operationId: listAttachments
      tags: [Owner]
      summary: List attachments for item
      description: |
        Returns attachment metadata (pending + ready) for the item. Omits s3Key.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Attachment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/items/{itemId}/attachments/presign:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/itemId"
    post:
      operationId: presignAttachment
      tags: [Owner]
      summary: Presign attachment upload
      description: |
        Creates a pending ATT row (TTL 24h) and returns a SigV4 presigned PUT URL.
        Server generates S3 key `trips/{tripId}/items/{itemId}/{attachmentId}`
        (fileName never enters the key). PUT signs Content-Type, Content-Length,
        and `x-amz-tagging: pending=true`. Limits: 10 attachments/item, 5 concurrent
        pending, 15 MB max, allowlisted MIME types.
      security:
        - ownerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignAttachment"
      responses:
        "201":
          description: Pending row created; client must PUT then confirm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignAttachmentResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/items/{itemId}/attachments/{attachmentId}/confirm:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/itemId"
      - $ref: "#/components/parameters/attachmentId"
    post:
      operationId: confirmAttachment
      tags: [Owner]
      summary: Confirm attachment upload
      description: |
        HeadObject re-check (size must equal declared sizeBytes; Content-Type
        must match allowlist / declared type). Clears S3 `pending` tag and sets
        DDB status to `ready`. Idempotent when already ready.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Attachment ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentMeta"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/trips/{tripId}/items/{itemId}/attachments/{attachmentId}/url:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/itemId"
      - $ref: "#/components/parameters/attachmentId"
    get:
      operationId: getOwnerAttachmentUrl
      tags: [Owner]
      summary: Owner presigned download URL
      description: |
        Short-lived presigned GET with Content-Disposition attachment.
        Rejects if status ≠ ready.
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentDownloadUrlResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/trips/{tripId}/items/{itemId}/attachments/{attachmentId}:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/itemId"
      - $ref: "#/components/parameters/attachmentId"
    delete:
      operationId: deleteAttachment
      tags: [Owner]
      summary: Delete attachment
      description: Deletes the S3 object and DDB ATT row.
      security:
        - ownerBearer: []
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/shares:
    parameters:
      - $ref: "#/components/parameters/tripId"
    post:
      operationId: createShare
      tags: [Owner]
      summary: Create share grant
      description: |
        Creates a time-bounded share grant. Raw capability token returned **once**.
        Client builds `origin + path + "#" + token`. Server never returns a full URL
        containing the token. Token stored as SHA-256 hash only.
        `expiresAt` optional (default now+30d); must be future and ≤ now+365d.
      security:
        - ownerBearer: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareGrant"
      responses:
        "201":
          description: Grant created; raw token returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateShareResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    get:
      operationId: listShares
      tags: [Owner]
      summary: List share grants
      description: List grants for the trip (no raw tokens or token hashes).
      security:
        - ownerBearer: []
      responses:
        "200":
          description: Share grants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/trips/{tripId}/shares/{shareId}:
    parameters:
      - $ref: "#/components/parameters/tripId"
      - $ref: "#/components/parameters/shareId"
    delete:
      operationId: revokeShare
      tags: [Owner]
      summary: Revoke share grant
      description: |
        Sets revoked=true and deletes all sessions for this shareId (GSI4 only).
        Subsequent share requests with those sessions return 401.
      security:
        - ownerBearer: []
      responses:
        "204":
          description: Revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v1/share/session:
    post:
      operationId: createShareSession
      tags: [Public]
      summary: Exchange share token for session cookie
      description: |
        Hash the raw token, look up grant (GSI2), check revoked/expiry/trip status.
        On success sets HttpOnly Secure SameSite=Lax cookie `tripplan_share`.
        Rate limited (20 attempts/hour/IP). Origin checked when configured.
        v1: a new exchange replaces any previous share session cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareSession"
      responses:
        "204":
          description: Session created; Set-Cookie tripplan_share
          headers:
            Set-Cookie:
              schema:
                type: string
              description: tripplan_share=…; HttpOnly; Secure; SameSite=Lax; Path=/
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Origin not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
      # Note: exchange returns 401 (not 410) when the trip is deleted so token
      # probes cannot oracle “was a real grant for a now-gone trip”. 410 is used
      # only on authenticated share GETs after a session is established.
    delete:
      operationId: deleteShareSession
      tags: [Share]
      summary: Clear share session
      description: Deletes the session and clears the tripplan_share cookie.
      security:
        - shareCookie: []
      responses:
        "204":
          description: Session cleared
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cleared tripplan_share cookie (Max-Age=0)
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/share/trip:
    get:
      operationId: getShareTrip
      tags: [Share]
      summary: Read-only shared trip
      description: |
        Returns ShareTripDTO (meta + items + ready attachment metadata only).
        Revalidates grant + trip every request; 410 if trip deleted/deleting;
        401 if grant revoked/expired or session missing.
      security:
        - shareCookie: []
      responses:
        "200":
          description: Share trip DTO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTripDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "410":
          $ref: "#/components/responses/Gone"
  /api/v1/share/items/{itemId}/attachments/{attachmentId}/url:
    parameters:
      - $ref: "#/components/parameters/itemId"
      - $ref: "#/components/parameters/attachmentId"
    get:
      operationId: getShareAttachmentUrl
      tags: [Share]
      summary: Share viewer presigned download URL
      description: |
        Session supplies tripId; GetItem `PK=TRIP#tripId`,
        `SK=ATT#itemId#attachmentId`. Rejects if status ≠ ready.
        No dual-auth under `/trips*` — share-only path.
      security:
        - shareCookie: []
      responses:
        "200":
          description: Presigned download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentDownloadUrlResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/v1/enrich/flight:
    post:
      operationId: enrichFlight
      tags: [Owner]
      summary: Flight schedule enrichment
      description: |
        Lookup flight schedule by number + civil date. **Owner JWT required**
        (never public). Suggest-then-confirm: returns a prefill DTO; does **not**
        write itinerary items. Schedule not found is **200** with
        `{ status: "not_found" }` (not ApiErrorBody). Ambiguous matches → 422
        `AmbiguousEnrichment`. Live provider is AeroDataBox when
        `enrichment.flight.live` / `ENRICHMENT_FLIGHT_LIVE` is true; default is
        mock. Per-user rate limit (default 60/hour) and monthly $ budget apply.
      security:
        - ownerBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrichFlightRequest"
            examples:
              ua100:
                summary: United 100
                value:
                  flightNumber: "UA100"
                  date: "2026-07-15"
                  departureAirportHint: "SFO"
      responses:
        "200":
          description: |
            Enrichment suggestion (found / cancelled) or not_found success DTO.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightEnrichmentResponse"
              examples:
                found:
                  summary: Schedule found
                  value:
                    status: found
                    airlineCode: UA
                    airlineName: United Airlines
                    flightNumber: "100"
                    departure:
                      airportIata: SFO
                      airportName: San Francisco International Airport
                      scheduledAt: "2026-07-15T08:00:00-07:00"
                      lat: 37.6213
                      lng: -122.379
                      timezone: America/Los_Angeles
                    arrival:
                      airportIata: JFK
                      scheduledAt: "2026-07-15T16:30:00-04:00"
                      lat: 40.6413
                      lng: -73.7781
                      timezone: America/New_York
                    provider: mock
                    fetchedAt: "2026-07-11T12:00:00Z"
                    confidence: 0.95
                not_found:
                  summary: Schedule not found (still HTTP 200)
                  value:
                    status: not_found
                    provider: mock
                    fetchedAt: "2026-07-11T12:00:00Z"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Ambiguous enrichment (multiple candidates)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "429":
          description: Per-user enrich rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
        "502":
          description: Upstream unavailable or monthly budget exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorBody"
components:
  securitySchemes:
    ownerBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC access token from auth.ericminassian.com (audience `plan`).
        DPoP-bound tokens must include a valid DPoP proof (mode auto).
    shareCookie:
      type: apiKey
      in: cookie
      name: tripplan_share
      description: Opaque share session id set by POST /share/session
  parameters:
    tripId:
      name: tripId
      in: path
      required: true
      schema:
        type: string
    itemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
    shareId:
      name: shareId
      in: path
      required: true
      schema:
        type: string
    attachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    NotFound:
      description: Resource not found (or soft-deleted for owner GET)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Conflict:
      description: Optimistic concurrency conflict (version mismatch)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
    Gone:
      description: Trip deleted/deleting (share revalidation)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiErrorBody"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: ok
    UserProfile:
      type: object
      additionalProperties: false
      required: [userId, iss, displayName, createdAt]
      properties:
        userId:
          type: string
          description: OIDC subject (`sub`)
        iss:
          type: string
          description: Token issuer
        displayName:
          type: string
          description: From nickname claim when present; otherwise previous or sub
        createdAt:
          type: string
          description: Canonical Instant (ISO-8601 second precision with zone)
          examples:
            - "2026-07-10T12:00:00Z"
    CivilDate:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2}$'
      description: Real calendar civil date YYYY-MM-DD
    CreateTrip:
      type: object
      additionalProperties: false
      required: [title, timezone, startDate, endDate]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        timezone:
          type: string
          description: IANA time zone
        startDate:
          $ref: "#/components/schemas/CivilDate"
        endDate:
          $ref: "#/components/schemas/CivilDate"
    UpdateTrip:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        timezone:
          type: string
        startDate:
          $ref: "#/components/schemas/CivilDate"
        endDate:
          $ref: "#/components/schemas/CivilDate"
      description: At least one field required. Do not send expectedVersion.
    Trip:
      type: object
      additionalProperties: false
      required:
        [tripId, ownerId, title, timezone, startDate, endDate, version, status]
      properties:
        tripId:
          type: string
        ownerId:
          type: string
        title:
          type: string
        timezone:
          type: string
        startDate:
          $ref: "#/components/schemas/CivilDate"
        endDate:
          $ref: "#/components/schemas/CivilDate"
        version:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [active, deleting, deleted]
        deletedAt:
          type: string
          description: Present when soft-deleted
    TripDetail:
      allOf:
        - $ref: "#/components/schemas/Trip"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ItineraryItem"
              description: Itinerary items ordered by sortKey ascending
    ItemType:
      type: string
      enum:
        - flight
        - train
        - hotel
        - transport
        - activity
        - ticket
        - note
        - custom
    CreateItineraryItem:
      type: object
      required: [type, title, details]
      description: |
        Discriminated create DTO (runtime schema is a typed union in
        `@tripplan/domain`; OpenAPI documents the envelope only). Omits server
        fields (itemId, tripId, sortKey, version, createdAt, updatedAt).
        Instant fields accept RFC 3339 with zone. `details` shape is validated
        per `type` (e.g. flight requires flightNumber).
      properties:
        type:
          $ref: "#/components/schemas/ItemType"
        title:
          type: string
          minLength: 1
          maxLength: 200
        startAt:
          type: string
        endAt:
          type: string
        startTimeZone:
          type: string
        endTimeZone:
          type: string
        startLocation:
          type: object
          additionalProperties: true
        endLocation:
          type: object
          additionalProperties: true
        notes:
          type: string
          maxLength: 5000
        confirmationCode:
          type: string
          maxLength: 64
        enrichment:
          type: object
          additionalProperties: true
        details:
          type: object
          additionalProperties: true
          description: Type-specific details (must match `type`; validated at runtime)
    UpdateItineraryItem:
      type: object
      additionalProperties: false
      description: |
        Partial patch. Do not send `type` (immutable) or `expectedVersion` (use If-Match).
        When `details` is present it fully replaces details for the stored type.
        `startAt` / `endAt`: Instant string to set, JSON `null` to clear, omit to leave.
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        startAt:
          type: string
          nullable: true
          description: RFC 3339 Instant to set, or null to clear
        endAt:
          type: string
          nullable: true
          description: RFC 3339 Instant to set, or null to clear
        startTimeZone:
          type: string
        endTimeZone:
          type: string
        startLocation:
          type: object
          additionalProperties: true
        endLocation:
          type: object
          additionalProperties: true
        notes:
          type: string
          maxLength: 5000
        confirmationCode:
          type: string
          maxLength: 64
        enrichment:
          type: object
          additionalProperties: true
        details:
          type: object
          additionalProperties: true
    ItineraryItem:
      type: object
      required:
        - itemId
        - tripId
        - type
        - title
        - details
        - sortKey
        - version
        - createdAt
        - updatedAt
      properties:
        itemId:
          type: string
        tripId:
          type: string
        type:
          $ref: "#/components/schemas/ItemType"
        title:
          type: string
        startAt:
          type: string
        endAt:
          type: string
        startTimeZone:
          type: string
        endTimeZone:
          type: string
        startLocation:
          type: object
          additionalProperties: true
        endLocation:
          type: object
          additionalProperties: true
        notes:
          type: string
        confirmationCode:
          type: string
        sortKey:
          type: number
          description: Ordering attribute; never encoded in Dynamo SK
        version:
          type: integer
          minimum: 1
        enrichment:
          type: object
          additionalProperties: true
        details:
          type: object
          additionalProperties: true
        createdAt:
          type: string
        updatedAt:
          type: string
    ReorderItems:
      type: object
      additionalProperties: false
      required: [itemIds]
      properties:
        itemIds:
          type: array
          items:
            type: string
          description: Full permutation of all current item IDs for the trip
    TripListResponse:
      type: object
      additionalProperties: false
      required: [trips]
      properties:
        trips:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        nextCursor:
          type: string
          description: Opaque cursor for the next page when more results exist
    TripDeleteResponse:
      type: object
      additionalProperties: false
      required: [tripId, status, version]
      properties:
        tripId:
          type: string
        status:
          type: string
          const: deleted
        deletedAt:
          type: string
        version:
          type: integer
    CreateShareGrant:
      type: object
      additionalProperties: false
      properties:
        label:
          type: string
          maxLength: 80
          description: Optional human label (e.g. Family)
        expiresAt:
          type: string
          description: |
            ISO Instant. Omit for default now+30 days. Must be strictly in the
            future and ≤ now+365 days.
    CreateShareResponse:
      type: object
      additionalProperties: false
      required: [shareId, token, path, expiresAt, label]
      properties:
        shareId:
          type: string
        token:
          type: string
          description: Raw capability token — returned once; never logged
        path:
          type: string
          const: /s
        expiresAt:
          type: string
        label:
          type: string
    ShareGrantPublic:
      type: object
      additionalProperties: false
      required: [shareId, tripId, expiresAt, revoked, label]
      properties:
        shareId:
          type: string
        tripId:
          type: string
        expiresAt:
          type: string
        revoked:
          type: boolean
        label:
          type: string
    ShareListResponse:
      type: object
      additionalProperties: false
      required: [shares]
      properties:
        shares:
          type: array
          items:
            $ref: "#/components/schemas/ShareGrantPublic"
    CreateShareSession:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
          maxLength: 128
          description: Raw share capability token from the hash fragment (~43 base64url chars)
    ShareTripDTO:
      type: object
      additionalProperties: false
      required:
        - tripId
        - title
        - timezone
        - startDate
        - endDate
        - ownerDisplayName
        - items
        - attachments
      properties:
        tripId:
          type: string
        title:
          type: string
        timezone:
          type: string
        startDate:
          $ref: "#/components/schemas/CivilDate"
        endDate:
          $ref: "#/components/schemas/CivilDate"
        ownerDisplayName:
          type: string
          description: Owner display name only (no ownerId)
        items:
          type: array
          items:
            $ref: "#/components/schemas/ItineraryItem"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentMeta"
          description: Ready attachment metadata only (pending omitted; no s3Key)
    PresignAttachment:
      type: object
      additionalProperties: false
      required: [contentType, fileName, sizeBytes]
      properties:
        contentType:
          type: string
          description: Allowlisted MIME (application/pdf, image/jpeg|png|webp|gif)
        fileName:
          type: string
          minLength: 1
          maxLength: 180
        sizeBytes:
          type: integer
          exclusiveMinimum: 0
          maximum: 15728640
          description: Exact integer byte length; signed on PUT and re-checked via HeadObject
    PresignAttachmentResponse:
      type: object
      additionalProperties: false
      required: [attachmentId, s3Key, uploadUrl, requiredHeaders, expiresIn]
      properties:
        attachmentId:
          type: string
        s3Key:
          type: string
          description: Server-generated key trips/{tripId}/items/{itemId}/{attachmentId}
        uploadUrl:
          type: string
          description: SigV4 presigned PUT URL
        requiredHeaders:
          type: object
          additionalProperties:
            type: string
          description: Headers the client must send (Content-Type, Content-Length, x-amz-tagging)
        expiresIn:
          type: number
          description: Seconds until the upload URL expires
    AttachmentMeta:
      type: object
      additionalProperties: false
      required:
        - attachmentId
        - tripId
        - itemId
        - status
        - contentType
        - sizeBytes
        - fileName
        - createdAt
      properties:
        attachmentId:
          type: string
        tripId:
          type: string
        itemId:
          type: string
        status:
          type: string
          enum: [pending, ready]
        contentType:
          type: string
        sizeBytes:
          type: number
        fileName:
          type: string
          maxLength: 180
        createdAt:
          type: string
        expiresAt:
          type: string
          description: Present while pending (24h TTL)
    AttachmentListResponse:
      type: object
      additionalProperties: false
      required: [attachments]
      properties:
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentMeta"
    AttachmentDownloadUrlResponse:
      type: object
      additionalProperties: false
      required: [url, expiresIn]
      properties:
        url:
          type: string
          description: Short-lived presigned GET URL
        expiresIn:
          type: number
    ApiErrorBody:
      type: object
      additionalProperties: false
      required: [type, message, retryable, requestId]
      properties:
        type:
          type: string
          enum:
            - NotFound
            - Forbidden
            - Unauthorized
            - ValidationError
            - MethodNotAllowed
            - Conflict
            - Gone
            - PayloadTooLarge
            - RateLimited
            - UpstreamUnavailable
            - AmbiguousEnrichment
            - InternalError
        message:
          type: string
        details: {}
        retryable:
          type: boolean
        requestId:
          type: string

    EnrichFlightRequest:
      type: object
      additionalProperties: false
      required: [flightNumber, date]
      properties:
        flightNumber:
          type: string
          minLength: 1
          maxLength: 16
          description: Airline designator + number (e.g. UA100 or UA 100)
        date:
          $ref: "#/components/schemas/CivilDate"
        departureAirportHint:
          type: string
          pattern: '^[A-Za-z]{3}$'
          description: Optional departure IATA to disambiguate
    FlightEndpointSuggestion:
      type: object
      additionalProperties: false
      required: [airportIata, scheduledAt]
      properties:
        airportIata:
          type: string
        airportName:
          type: string
        scheduledAt:
          type: string
          description: Canonical Instant (ISO-8601 second precision with zone)
        terminal:
          type: string
        gate:
          type: string
        lat:
          type: number
        lng:
          type: number
        timezone:
          type: string
    FlightEnrichmentFound:
      type: object
      additionalProperties: false
      required:
        - status
        - flightNumber
        - departure
        - arrival
        - provider
        - fetchedAt
      properties:
        status:
          type: string
          enum: [found, cancelled]
        airlineCode:
          type: string
        airlineName:
          type: string
        flightNumber:
          type: string
        departure:
          $ref: "#/components/schemas/FlightEndpointSuggestion"
        arrival:
          $ref: "#/components/schemas/FlightEndpointSuggestion"
        provider:
          type: string
          description: mock | aerodatabox
        fetchedAt:
          type: string
        confidence:
          type: number
        operatedBy:
          type: string
    FlightEnrichmentNotFound:
      type: object
      additionalProperties: false
      required: [status, provider, fetchedAt]
      properties:
        status:
          type: string
          const: not_found
        provider:
          type: string
        fetchedAt:
          type: string
    FlightEnrichmentResponse:
      oneOf:
        - $ref: "#/components/schemas/FlightEnrichmentFound"
        - $ref: "#/components/schemas/FlightEnrichmentNotFound"
      description: |
        Success body for POST /enrich/flight. `not_found` is HTTP 200 (not
        ApiErrorBody) so clients do not confuse it with resource 404.
